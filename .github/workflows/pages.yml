name: Validate Store Site

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'store-site/**'
      - 'site-runtime.js'
      - 'index.html'
      - 'tr/**'
      - 'en/**'
      - 'robots.txt'
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: node store-site/build.mjs

      - name: Verify branch-root fallback
        run: |
          test -f index.html
          test -f tr/privacy/index.html
          test -f en/privacy/index.html
          test -f site-runtime.js
